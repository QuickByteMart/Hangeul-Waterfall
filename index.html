<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Hangeul Waterfall</title>

    <link rel="manifest" href="manifest.json">

    <style>
        /* Define theme variables. Defaults to Tan theme */
        :root {
            --bg-color: #b89a75;
            --text-color: #2b2620;
        }

        body { 
            margin: 0; background: var(--bg-color); height: 100vh; overflow: hidden; 
            font-family: 'Courier New', monospace; touch-action: none; 
            overscroll-behavior: none; 
            transition: background 0.3s ease;
        }
        
        #app-container { width: 100vw; height: 100vh; display: flex; flex-direction: column; }
        
        #matrix-canvas { 
            display: block; 
            background: var(--bg-color); 
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.15); 
            width: 100vw; 
        }

        .screensaver-mode #matrix-canvas { 
            flex: 0 0 100vh; 
        }
        
        #menu-ui { 
            flex: 1; background: var(--bg-color); display: flex; flex-direction: column; 
            padding: 20px; padding-bottom: 90px; gap: 20px; 
            border-top: 2px solid var(--text-color); box-shadow: 0 -5px 15px rgba(0,0,0,0.1);
            color: var(--text-color); position: relative;
            transition: all 0.3s ease;
        }

        #ad-container { 
            position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
            width: 120px; height: 60px; border: 1px solid var(--text-color); 
            box-shadow: 0 0 10px rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        .controls-wrapper { display: flex; flex-direction: column; gap: 20px; margin-top: auto; margin-bottom: 30px; }
        .row-top { display: flex; justify-content: space-between; align-items: center; }
        
        .color-selector { display: flex; gap: 10px; }
        .color-btn { 
            padding: 8px 12px; border: 1px solid var(--text-color); cursor: pointer; 
            background: transparent; color: var(--text-color); font-weight: bold; 
            transition: 0.3s; opacity: 0.4; 
        }
        .color-btn.active { opacity: 1; box-shadow: 0 0 15px var(--text-color); background: var(--text-color); color: var(--bg-color); }

        #speed-slider { 
            width: 100px; accent-color: var(--text-color); cursor: pointer; 
            filter: drop-shadow(0 0 2px rgba(0,0,0,0.2));
        }

        #engage-btn { 
            align-self: center;
            background: transparent; color: var(--text-color); padding: 10px 30px; 
            border: 1px solid var(--text-color); font-weight: bold; cursor: pointer; 
            box-shadow: 0 0 10px rgba(0,0,0,0.1); text-transform: uppercase;
        }
        #engage-btn:hover { background: var(--text-color); color: var(--bg-color); }

        .screensaver-mode #menu-ui { display: none; }
        .screensaver-mode #matrix-canvas { flex: 0 0 100vh; }

        #screensaver-close {
            display: none; position: fixed; bottom: 10px; right: 15px;
            color: #333; cursor: pointer; z-index: 9999;
            font-size: 20px; font-weight: bold;
        }
        .screensaver-mode #screensaver-close { display: block; }
    </style>
</head>
<body id="app-body">

<div id="app-container">
    <canvas id="matrix-canvas"></canvas>
    <div id="menu-ui">
        <div class="controls-wrapper">
            <div class="row-top">
                <div class="color-selector">
                    <div class="color-btn active" data-bg="#b89a75">TAN</div>
                    <div class="color-btn" data-bg="#2b2620">DARK</div>
                </div>
                <input type="range" id="speed-slider" min="20" max="300" step="10" value="220">
            </div>
            <div id="engage-btn">Full Screen</div>
        </div>

        <div id="ad-container">
            <div id="frame" style="width: 120px;margin: auto;z-index: 99998;height: auto">
                <iframe data-aa='2445512' src='//ad.a-ads.com/2445512/?size=120x60'
                        style='border:0; padding:0; width:120px; height:60px; overflow:hidden;display: block;margin: auto'></iframe>
            </div>
        </div>
    </div>
</div>

<div id="screensaver-close">X</div>

<script>
    const canvas = document.getElementById('matrix-canvas');
    const ctx = canvas.getContext('2d');
    const body = document.getElementById('app-body');
    const engageBtn = document.getElementById('engage-btn');
    const speedSlider = document.getElementById('speed-slider');
    
    // Dynamic tracking for waterfall background alpha trail and character colors
    let currentBg = '#b89a75';
    let trailColor = 'rgba(184, 154, 117, 0.08)'; // #b89a75 in RGBA
    let matrixTextColor = '#2b2620';
    
    let speedDelay = 320 - parseInt(speedSlider.value);
    
    speedSlider.addEventListener('input', (e) => {
        const val = parseInt(e.target.value);
        speedDelay = 320 - val; 
    });
    
    let wakeLock = null;

    async function requestWakeLock() {
        try {
            wakeLock = await navigator.wakeLock.request('screen');
        } catch (err) {
            console.error(`${err.name}, ${err.message}`);
        }
    }

    document.getElementById('screensaver-close').addEventListener('click', () => {
        if (document.fullscreenElement) document.exitFullscreen();
        body.classList.remove('screensaver-mode');
        init();
    });

    engageBtn.addEventListener('click', () => {
        body.classList.add('screensaver-mode');
        requestWakeLock();
        init(); 
        if (canvas.requestFullscreen) {
            canvas.requestFullscreen();
        }
    });

    document.addEventListener('fullscreenchange', () => {
        if (!document.fullscreenElement) {
            body.classList.remove('screensaver-mode');
            if (wakeLock !== null) {
                wakeLock.release().then(() => { 
                    wakeLock = null; 
                    console.log('Wake Lock released');
                });
            }
            resize();
        }
    });

    // Theme Selector Button Logic
    document.querySelectorAll('.color-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            currentBg = btn.dataset.bg;
            
            if (currentBg === '#2b2620') {
                // Dark theme rules
                document.documentElement.style.setProperty('--bg-color', '#2b2620');
                document.documentElement.style.setProperty('--text-color', '#39ff14');
                trailColor = 'rgba(43, 38, 32, 0.08)'; // #2b2620 in RGBA
                matrixTextColor = '#39ff14';
            } else {
                // Tan theme rules
                document.documentElement.style.setProperty('--bg-color', '#b89a75');
                document.documentElement.style.setProperty('--text-color', '#2b2620');
                trailColor = 'rgba(184, 154, 117, 0.08)'; // #b89a75 in RGBA
                matrixTextColor = '#2b2620';
            }
            
            // Instantly flash canvas background during transition to prevent messy visual blending
            ctx.fillStyle = currentBg;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        });
    });

    const cyphers = '0123456789!@#$%^&*()_+-=[]{}|;:,.<>?/가나다라마바사아자차카타파하거너더러머버서어저처커터퍼허고노도로모보소오조초코토포호구누두루무부수우주추쿠투푸후그느드르므브스으즈츠크트프흐ΩΨΣΔΦ∆□';
    const charArray = cyphers.split('');
    const fontSize = 16;
    let columns, drops;

    function init() {
        canvas.width = window.innerWidth;
        canvas.height = body.classList.contains('screensaver-mode') ? window.innerHeight : window.innerHeight * 0.6;
        columns = Math.floor(canvas.width / fontSize);
        drops = Array(columns).fill(1); 
        
        // Ensure background is painted correctly on resize initialization
        ctx.fillStyle = currentBg;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function draw() {
        ctx.fillStyle = trailColor;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.font = `bold ${fontSize}px 'Courier New', monospace`;

        for (let i = 0; i < drops.length; i++) {
            const text = charArray[Math.floor(Math.random() * charArray.length)];

            ctx.fillStyle = matrixTextColor;
            
            // Add visual highlights depending on active theme
            if (Math.random() > 0.98) {
                ctx.fillStyle = (matrixTextColor === '#39ff14') ? '#fff' : '#000'; 
            }

            ctx.fillText(text, i * fontSize, drops[i] * fontSize);
            
            if (drops[i] * fontSize > canvas.height && Math.random() > 0.95) {
                drops[i] = 0;
            }
            drops[i]++;
        }
    }

    window.addEventListener('resize', init);
    init();

    let lastRender = 0;
    function loop(timestamp) {
        if (timestamp - lastRender > speedDelay) {
            draw();
            lastRender = timestamp;
        }
        requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
</script>
</body>
</html>
