<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Hangeul Waterfall</title>

    <link rel="manifest" href="manifest.json">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100dvh;
            overflow: hidden;
            background-color: #2b2620;
            font-family: 'Georgia', serif;
        }

        /* FIXED: Added the flex container layout to hold everything perfectly on screen */
        #app-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100dvh;
        }

        #matrix-canvas {
            flex: 1; /* Automatically takes up all leftover top space */
            display: block;
            width: 100%;
            background-color: #b89a75; 
        }

        #menu-ui { 
            flex: 0 0 auto; /* Keeps its natural height based on buttons/ad, doesn't get squished */
            background: #3d352a; 
            display: flex; 
            flex-direction: column; 
            padding: 20px; 
            padding-bottom: env(safe-area-inset-bottom, 20px); /* iPhone notch/home bar protection */
            border-top: 2px solid #8c7b66; 
            color: #d2b48c; 
            position: relative;
            z-index: 10;
        }

        #ad-container { 
            position: relative; 
            margin-top: 20px;   
            width: 120px; 
            height: 60px; 
            border: 1px solid #8c7b66; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            overflow: hidden;
            background: #2b2620;
            align-self: center; 
        }

        .controls-wrapper { 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
        }
        
        .row-top { display: flex; justify-content: space-between; align-items: center; }
        .color-selector { display: flex; gap: 10px; }

        .color-btn { 
            padding: 8px 12px; border: 1px solid #b89a75; cursor: pointer; 
            background: transparent; color: #b89a75; font-weight: bold; 
            transition: 0.3s; 
        }

        /* Filled look for active buttons */
        .color-btn.active { 
            background: #b89a75;
            color: #2b2620; 
        }

        #engage-btn { 
            align-self: center;
            background: transparent; 
            color: #d2b48c; 
            padding: 8px 16px; 
            border: 1px solid #d2b48c; 
            font-weight: bold; 
            cursor: pointer; 
            text-transform: uppercase;
            font-size: 12px; 
        }
        #engage-btn:hover { background: #d2b48c; color: #2b2620; }
        
        /* Screensaver Overrides */
        .screensaver-mode #menu-ui { display: none !important; }
        .screensaver-mode #matrix-canvas { 
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100dvh;
            z-index: 500; 
        }

        #screensaver-close {
            display: none; position: fixed; bottom: 20px; right: 20px;
            color: rgba(255,255,255,0.8); cursor: pointer; z-index: 9999;
            font-size: 20px; font-weight: bold;
            background: rgba(0,0,0,0.6); width: 40px; height: 40px;
            border-radius: 50%; text-align: center; line-height: 40px;
        }
        .screensaver-mode #screensaver-close { display: block; }
    </style>
</head>
<body id="app-body">

<div id="app-container">
    <canvas id="matrix-canvas"></canvas>
    <div id="menu-ui">
        <div class="controls-wrapper">
            <div class="row-top">
                <div class="color-selector">
                    <div class="color-btn active" data-color="#b89a75">Sand</div>
                    <div class="color-btn" data-color="#2b2620">Black</div>
                </div>
                <input type="range" id="speed-slider" min="20" max="300" step="10" value="220">
            </div>
            <div id="engage-btn">Full Screen</div>
        </div>

        <div id="ad-container">
            <div id="frame" style="width: 120px;margin: auto;z-index: 99998;height: auto">
                <iframe data-aa='2445512' src='//ad.a-ads.com/2445512/?size=120x60'
                        style='border:0; padding:0; width:120px; height:60px; overflow:hidden;display: block;margin: auto'></iframe>
            </div>
        </div>
    </div>
</div>

<div id="screensaver-close">X</div>

<script>
    const canvas = document.getElementById('matrix-canvas');
    const ctx = canvas.getContext('2d');
    const body = document.getElementById('app-body');
    const engageBtn = document.getElementById('engage-btn');
    const speedSlider = document.getElementById('speed-slider');
    
    let activeColors = {'#b89a75': true, '#2b2620': false};
    let speedDelay = 320 - parseInt(speedSlider.value);
    
    speedSlider.addEventListener('input', (e) => {
        speedDelay = 320 - parseInt(e.target.value); 
    });

    let wakeLock = null;
    async function requestWakeLock() {
        if ('wakeLock' in navigator) {
            try {
                wakeLock = await navigator.wakeLock.request('screen');
            } catch (err) {
                console.error(`${err.name}, ${err.message}`);
            }
        }
    }

    document.getElementById('screensaver-close').addEventListener('click', () => {
        if (document.fullscreenElement || document.webkitFullscreenElement) {
            if (document.exitFullscreen) document.exitFullscreen();
            else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        }
        body.classList.remove('screensaver-mode');
        init();
    });

    engageBtn.addEventListener('click', () => {
        body.classList.add('screensaver-mode');
        requestWakeLock();
        init(); 
        
        const target = document.documentElement; // Request fullscreen on page, not just canvas
        if (target.requestFullscreen) {
            target.requestFullscreen();
        } else if (target.webkitRequestFullscreen) {
            target.webkitRequestFullscreen(); // iOS Safari support
        }
    });

    function handleFullscreenChange() {
        if (!document.fullscreenElement && !document.webkitFullscreenElement) {
            body.classList.remove('screensaver-mode');
            if (wakeLock !== null) {
                wakeLock.release().then(() => { wakeLock = null; });
            }
            init(); // FIXED: Changed broken 'resize()' call to 'init()'
        } else {
            setTimeout(init, 150); // Let mobile browser bars collapse before resizing
        }
    }
    document.addEventListener('fullscreenchange', handleFullscreenChange);
    document.addEventListener('webkitfullscreenchange', handleFullscreenChange);

    document.querySelectorAll('.color-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            Object.keys(activeColors).forEach(key => activeColors[key] = false);
            activeColors[btn.dataset.color] = true;
        });
    });

    const cyphers = '가나다라마바사아자차카타파하거너더러머버서어저처커터퍼허고노도로모보소오조초코토포호구누두루무부수우주추쿠투푸후그느드르므브스으즈츠크트프흐ΩΨΣΔΦ∆□';
    const charArray = cyphers.split('');
    const fontSize = 18;
    let columns, drops;

    function init() {
        // FIXED: Dynamically matches canvas resolution to its layout size perfectly
        if (body.classList.contains('screensaver-mode')) {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        } else {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight - document.getElementById('menu-ui').offsetHeight;
        }
        
        ctx.clearRect(0, 0, canvas.width, canvas.height); 
        columns = Math.floor(canvas.width / fontSize);
        drops = Array(columns).fill(1);
    }

    function draw() {
        const activeBtn = document.querySelector('.color-btn.active');
        const bgColor = activeBtn ? activeBtn.dataset.color : '#b89a75';

        canvas.style.backgroundColor = bgColor;
        ctx.fillStyle = bgColor + '26'; 
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = (bgColor === '#2b2620') ? '#39ff14' : '#2b2620';
        ctx.font = `bold ${fontSize}px 'Georgia', serif`;

        for (let i = 0; i < drops.length; i++) {
            const text = charArray[Math.floor(Math.random() * charArray.length)];
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);
            
            if (drops[i] * fontSize > canvas.height && Math.random() > 0.95) {
                drops[i] = 0;
            }
            drops[i]++;
        }
    }

    window.addEventListener('resize', init);
    init();

    let lastRender = 0;
    function loop(timestamp) {
        if (timestamp - lastRender > speedDelay) {
            draw();
            lastRender = timestamp;
        }
        requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
</script>
</body>
</html>
